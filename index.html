<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#185FA5">
<title>漢字テスト 手書き</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>:root{
--font:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
--jp:'Noto Sans JP',var(--font);
--tx:#23221e;--tx2:#6b6a64;--tx3:#9a988f;
--bg:#faf8f3;--card:#ffffff;--surf:#f1efe8;--surf2:#e7e4dc;
--bd:rgba(0,0,0,.10);--bd2:rgba(0,0,0,.22);
--blue:#185FA5;--blue-d:#0C447C;--blue-bg:#E6F1FB;--blue-tx:#185FA5;
--green:#1D9E75;--green-d:#0F6E56;--green-bg:#E1F5EE;
--red:#E24B4A;--red-d:#A32D2D;--red-bg:#FCEBEB;
--amber-bg:#FAEEDA;--amber-tx:#BA7517;
--r:10px;--r-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
--tx:#ecebe6;--tx2:#a8a69e;--tx3:#76746d;
--bg:#1c1b16;--card:#26251f;--surf:#2f2e27;--surf2:#3a382f;
--bd:rgba(255,255,255,.12);--bd2:rgba(255,255,255,.26);
--blue:#378ADD;--blue-d:#85B7EB;--blue-bg:#0C447C;--blue-tx:#B5D4F4;
--green:#1D9E75;--green-d:#5DCAA5;--green-bg:#085041;
--red:#E24B4A;--red-d:#F09595;--red-bg:#791F1F;
--amber-bg:#633806;--amber-tx:#FAC775;
}}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--bg);color:var(--tx);font-family:var(--font);
-webkit-text-size-adjust:100%;}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);min-height:100vh;
min-height:100dvh;}
.wrap{max-width:520px;margin:0 auto;padding:14px;}

/* ヘッダー */
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hd h1{font-size:17px;font-weight:600;margin:0;letter-spacing:.01em;}
.hd .gear{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;
padding:6px;line-height:1;border-radius:8px;}
.hd .gear:active{background:var(--surf);}

.card{background:var(--card);border:0.5px solid var(--bd);border-radius:var(--r-lg);
padding:18px 16px 20px;}

/* セットアップ */
.setup{text-align:center;}
.setup h2{font-size:18px;font-weight:600;margin:4px 0 4px;}
.setup .sub{font-size:13px;color:var(--tx2);margin:0 0 16px;}
.range-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;text-align:left;}
.range-item{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--surf);
border:1.5px solid transparent;border-radius:var(--r);cursor:pointer;transition:border-color .12s,background .12s;}
.range-item.sel{border-color:var(--blue);background:var(--blue-bg);}
.range-item .nm{font-size:15px;font-weight:500;flex:1;}
.range-item .meta{font-size:12px;color:var(--tx3);}
.range-item .ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd2);
display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.range-item.sel .ck{border-color:var(--blue);background:var(--blue);color:#fff;font-size:12px;}
.qcount{font-size:12px;color:var(--tx3);margin:10px 0 2px;}

/* ソース切替タブ（学年 / ドリル) */
.src-tabs{display:flex;gap:6px;margin:0 0 14px;background:var(--surf);padding:4px;border-radius:var(--r);}
.src-tabs .st{flex:1;font-family:var(--font);font-size:13px;font-weight:600;padding:9px 6px;
border:none;border-radius:7px;background:transparent;color:var(--tx2);cursor:pointer;}
.src-tabs .st.on{background:var(--card);color:var(--blue);box-shadow:0 1px 2px rgba(0,0,0,.06);}

/* 学年チップ行 */
.grade-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px;}
.gchip{font-family:var(--font);font-size:13px;font-weight:600;padding:11px 2px;border:1.5px solid var(--bd2);
border-radius:var(--r);background:var(--card);color:var(--tx2);cursor:pointer;text-align:center;}
.gchip.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.gchip .gc-n{font-size:15px;}
.gchip .gc-c{display:block;font-size:9px;opacity:.75;margin-top:1px;font-weight:500;}

/* 範囲（かたまり)リスト */
.chunk-hd{display:flex;align-items:center;justify-content:space-between;margin:2px 0 6px;}
.chunk-hd .ch-t{font-size:12px;color:var(--tx3);}
.chunk-hd .ch-all{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;padding:2px 4px;font-family:var(--font);}
.chunk-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.chunk{display:flex;align-items:center;gap:9px;padding:11px 12px;background:var(--surf);
border:1.5px solid transparent;border-radius:var(--r);cursor:pointer;}
.chunk.sel{border-color:var(--blue);background:var(--blue-bg);}
.chunk .ck{width:19px;height:19px;border-radius:50%;border:2px solid var(--bd2);flex-shrink:0;
display:flex;align-items:center;justify-content:center;font-size:11px;}
.chunk.sel .ck{border-color:var(--blue);background:var(--blue);color:#fff;}
.chunk .cnm{flex:1;font-size:14px;font-weight:500;}
.chunk .cprev{font-family:var(--jp);font-size:13px;color:var(--tx3);letter-spacing:.04em;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46%;}

/* 漢字個別グリッド */
.krid-wrap{margin:4px 0 8px;}
.krid-hd{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--tx3);margin-bottom:6px;}
.krid-hd button{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:var(--font);padding:2px 4px;}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(38px,1fr));gap:5px;
max-height:190px;overflow-y:auto;padding:2px;-webkit-overflow-scrolling:touch;}
.kc{font-family:var(--jp);font-size:19px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;
border:1.5px solid var(--bd2);border-radius:8px;background:var(--card);color:var(--tx);cursor:pointer;
-webkit-tap-highlight-color:transparent;user-select:none;}
.kc.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.kc.off{opacity:.32;}
.grade-empty{font-size:13px;color:var(--tx3);text-align:center;padding:18px 0;}
.modes{display:flex;gap:8px;justify-content:center;margin:6px 0 4px;flex-wrap:wrap;}
.chip{font-size:13px;padding:7px 14px;border:0.5px solid var(--bd2);border-radius:20px;
background:var(--card);color:var(--tx2);cursor:pointer;}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary{width:100%;margin-top:14px;padding:15px;font-family:var(--font);font-size:16px;
font-weight:600;border:none;border-radius:var(--r);background:var(--blue);color:#fff;cursor:pointer;}
.btn-primary:active{background:var(--blue-d);}
.btn-primary:disabled{opacity:.4;cursor:default;}

/* クイズ */
.quiz-top{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-size:12px;color:var(--tx2);}
.to-menu{font-family:var(--font);font-size:12px;font-weight:600;color:var(--tx2);background:var(--surf);
border:1.5px solid var(--bd2);border-radius:999px;padding:6px 12px;cursor:pointer;flex-shrink:0;
-webkit-tap-highlight-color:transparent;}
.to-menu:active{background:var(--bd2);}
.result .to-menu{display:block;width:100%;margin-top:10px;padding:12px;font-size:15px;border-radius:var(--r);}
.prog{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden;flex:1;}
.prog-bar{height:100%;background:var(--green);width:0;transition:width .3s;}
.badge{font-size:11px;color:var(--amber-tx);background:var(--amber-bg);padding:3px 9px;border-radius:10px;white-space:nowrap;}
.stem{font-family:var(--jp);font-size:22px;line-height:2.1;margin:0 0 20px;letter-spacing:.02em;
min-height:2.2em;word-break:break-all;}
.blank{display:inline-flex;align-items:center;justify-content:center;width:1.55em;height:1.55em;
border:2px solid var(--blue);border-radius:7px;vertical-align:-.38em;margin:0 .08em;
background:var(--blue-bg);color:var(--blue-tx);font-size:.82em;font-weight:500;}
.blank.ok{border-color:var(--green);background:var(--green-bg);color:var(--green-d);}
.blank.ng{border-color:var(--red);background:var(--red-bg);color:var(--red-d);}
.yomi{font-size:11px;color:var(--tx3);vertical-align:.4em;margin:0 1px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opt{font-family:var(--jp);font-size:32px;padding:18px 8px;background:var(--card);
border:0.5px solid var(--bd2);border-radius:var(--r);cursor:pointer;color:var(--tx);
transition:transform .07s,background .12s,border-color .12s;-webkit-tap-highlight-color:transparent;}
.opt:active:not(:disabled){transform:scale(.96);}
.opt:disabled{cursor:default;}
.opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green-d);}
.opt.incorrect{background:var(--red-bg);border-color:var(--red);color:var(--red-d);}
.opt.dim{opacity:.35;}
.fb{text-align:center;min-height:1.5em;margin:18px 0 2px;font-size:15px;font-weight:600;}
.fb.ok{color:var(--green-d);}.fb.ng{color:var(--red-d);}
.btn-next{display:block;width:100%;margin-top:12px;padding:14px;font-family:var(--font);
font-size:15px;font-weight:500;border:0.5px solid var(--bd2);border-radius:var(--r);
background:var(--card);color:var(--tx);cursor:pointer;}
.btn-next:active{background:var(--surf);}

/* 結果 */
.result{text-align:center;}
.result h2{font-size:18px;font-weight:600;margin:4px 0 2px;}
.score{font-size:46px;font-weight:700;margin:8px 0 2px;color:var(--tx);}
.rlabel{font-size:13px;color:var(--tx2);margin-bottom:16px;}
.review{text-align:left;background:var(--surf);border-radius:var(--r);padding:12px 14px;margin:12px 0;}
.review h3{font-size:13px;font-weight:600;margin:0 0 8px;color:var(--tx2);}
.rrow{display:flex;align-items:baseline;gap:10px;padding:5px 0;font-size:14px;}
.rrow .rk{font-family:var(--jp);font-size:22px;color:var(--red-d);min-width:1.2em;text-align:center;font-weight:500;}
.rrow .rs{color:var(--tx2);font-family:var(--jp);}

/* 設定/範囲管理 オーバーレイ */
.sheet{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;
justify-content:center;z-index:50;}
.sheet-inner{background:var(--card);width:100%;max-width:520px;max-height:90vh;max-height:90dvh;
overflow-y:auto;border-radius:18px 18px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sheet-hd h2{font-size:17px;font-weight:600;margin:0;}
.sheet-hd .x{background:none;border:none;font-size:24px;color:var(--tx2);cursor:pointer;line-height:1;padding:4px;}
.mrange{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surf);
border-radius:var(--r);margin-bottom:8px;}
.mrange .mn{flex:1;font-size:14px;font-weight:500;}
.mrange .mm{font-size:11px;color:var(--tx3);}
.mrange .del{background:none;border:none;color:var(--red-d);font-size:18px;cursor:pointer;padding:4px 8px;}
.mrange .lock{font-size:11px;color:var(--tx3);padding:4px 8px;}
.addbtns{display:flex;gap:8px;margin-top:12px;}
.addbtns button{flex:1;padding:13px;font-family:var(--font);font-size:14px;font-weight:500;
border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--card);color:var(--tx);cursor:pointer;}
.addbtns button:active{background:var(--surf);}
.addbtns button.accent{background:var(--blue);color:#fff;border-color:var(--blue);}

/* フォーム */
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;font-weight:500;}
.field input,.field textarea{width:100%;font-family:var(--jp);font-size:15px;padding:11px 12px;
border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--card);color:var(--tx);}
.field textarea{min-height:120px;resize:vertical;font-size:13px;line-height:1.5;}
.field .hint{font-size:11px;color:var(--tx3);margin-top:4px;}
.qrow{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:start;
padding:10px;background:var(--surf);border-radius:var(--r);margin-bottom:8px;}
.qrow .qn{font-size:13px;color:var(--tx3);font-weight:600;padding-top:10px;}
.qrow .qf{display:flex;flex-direction:column;gap:6px;}
.qrow .qf .line{display:flex;gap:6px;}
.qrow input{width:100%;font-family:var(--jp);font-size:14px;padding:9px 10px;
border:0.5px solid var(--bd2);border-radius:8px;background:var(--card);color:var(--tx);}
.qrow input.k{flex:0 0 64px;text-align:center;}
.qrow input.y{flex:0 0 90px;}
.qrow .del{background:none;border:none;color:var(--red-d);font-size:16px;cursor:pointer;}
.preview-line{font-family:var(--jp);font-size:14px;color:var(--tx2);padding:4px 2px;}
.preview-line .bk{display:inline-block;min-width:1.3em;padding:0 .15em;border-bottom:2px solid var(--blue);
text-align:center;color:var(--blue-tx);}
.msg{font-size:13px;padding:10px 12px;border-radius:var(--r);margin:10px 0;}
.msg.err{background:var(--red-bg);color:var(--red-d);}
.msg.ok{background:var(--green-bg);color:var(--green-d);}
.hidden{display:none!important;}

/* 320〜360px の狭い端末 */
@media(max-width:360px){
.stem{font-size:20px;}
.opt{font-size:28px;padding:15px 6px;}
.wrap{padding:10px;}
.card{padding:15px 13px 17px;}
}

/* ===== 手書き記述式 追加スタイル ===== */
:root{ --ink-stroke:#1c3a5e; }
@media(prefers-color-scheme:dark){:root{ --ink-stroke:#cfe3f7; }}

.pad-wrap{position:relative;width:100%;aspect-ratio:1/1;max-width:300px;margin:0 auto 14px;
background:var(--card);border:2px solid var(--bd2);border-radius:var(--r-lg);overflow:hidden;
touch-action:none;}
/* 縦の狭い端末（iPhone等)ではパッドを画面高に合わせて縮め、答え合わせを常に見えるように */
@media(max-height:780px){
  .pad-wrap{max-width:min(300px, 44vh);margin-bottom:10px;}
  .stem{margin-bottom:12px !important;line-height:1.9 !important;}
  .pad-tools{margin-bottom:8px !important;}
  .recog-hint{margin-top:6px !important;}
  #scr-quiz .card{padding-top:12px;padding-bottom:14px;}
  .quiz-top{margin-bottom:12px !important;}
}
@media(max-height:670px){
  .pad-wrap{max-width:min(260px, 38vh);}
  .stem{font-size:19px !important;}
}
#pad{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair;touch-action:none;}
.pad-guide{position:absolute;inset:0;pointer-events:none;}
.pad-guide::before,.pad-guide::after{content:"";position:absolute;background:var(--bd);}
.pad-guide::before{left:50%;top:6%;bottom:6%;width:1px;border-left:1px dashed var(--bd2);}
.pad-guide::after{top:50%;left:6%;right:6%;height:1px;border-top:1px dashed var(--bd2);}

.pad-tools{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
.tool{font-family:var(--font);font-size:13px;padding:9px 16px;border:0.5px solid var(--bd2);
border-radius:20px;background:var(--card);color:var(--tx2);cursor:pointer;}
.tool:active{background:var(--surf);}
.recog-hint{text-align:center;font-size:12px;color:var(--tx3);margin-top:10px;}

/* 判定欄 */
.judge-stem{font-family:var(--jp);font-size:22px;line-height:2;text-align:center;margin:0 0 16px;letter-spacing:.02em;}
.judge-fb{text-align:center;margin-bottom:8px;}
.big-ok{font-size:28px;font-weight:700;color:var(--green-d);margin:8px 0;}
.recog-note{font-size:13px;color:var(--tx2);margin:10px 0;line-height:1.6;}
.model-answer{display:inline-flex;flex-direction:column;align-items:center;gap:6px;
background:var(--green-bg);border-radius:var(--r-lg);padding:14px 28px;margin:6px 0 4px;}
.ma-label{font-size:12px;color:var(--green-d);font-weight:500;}
.ma-kanji{font-family:var(--jp);font-size:64px;font-weight:500;color:var(--green-d);line-height:1.1;}
.self-result{font-size:17px;font-weight:600;margin-top:14px;}
.self-result.ok{color:var(--green-d);}
.self-result.ng{color:var(--red-d);}

.self-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;}
.self-btn{font-family:var(--font);font-size:16px;font-weight:600;padding:16px;border-radius:var(--r);
cursor:pointer;border:2px solid transparent;}
.self-btn.ok{background:var(--green-bg);color:var(--green-d);border-color:var(--green);}
.self-btn.ok:active{background:var(--green);color:#fff;}
.self-btn.ng{background:var(--red-bg);color:var(--red-d);border-color:var(--red);}
.self-btn.ng:active{background:var(--red);color:#fff;}

#next-wrap{margin-top:4px;}

@media(max-width:360px){
.pad-wrap{max-width:260px;}
.ma-kanji{font-size:54px;}
}

/* ===== 左右比較レイアウト ===== */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:6px 0 4px;}
.compare-col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.compare-label{font-size:12px;color:var(--tx2);font-weight:500;}
.compare-label.model{color:var(--green-d);}
.compare-box{width:100%;aspect-ratio:1/1;border:2px solid var(--bd2);border-radius:var(--r);
display:flex;align-items:center;justify-content:center;background:var(--card);overflow:hidden;position:relative;}
.compare-box.model{border-color:var(--green);background:var(--green-bg);}
.compare-box::before{content:"";position:absolute;left:50%;top:8%;bottom:8%;border-left:1px dashed var(--bd);}
.compare-box::after{content:"";position:absolute;top:50%;left:8%;right:8%;border-top:1px dashed var(--bd);}
#user-ink{width:100%;height:100%;object-fit:contain;position:relative;z-index:1;}
.model-kanji{font-family:var(--jp);font-size:72px;font-weight:500;color:var(--green-d);line-height:1;position:relative;z-index:1;}

/* ⚐ 報告ボタン */
.tool.report{color:var(--amber-tx);}
.tool.report.flagged{background:var(--amber-bg);border-color:var(--amber-tx);}

/* 気になる問題バナー */
.flagged-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;
background:var(--amber-bg);border-radius:var(--r);padding:11px 14px;margin-bottom:12px;}
.flagged-banner span{font-size:13px;color:var(--amber-tx);font-weight:500;}
.flagged-banner button{font-family:var(--font);font-size:13px;padding:7px 14px;border:none;
border-radius:16px;background:var(--amber-tx);color:#fff;cursor:pointer;white-space:nowrap;}

/* 気になる問題リスト */
.flag-item{display:flex;align-items:center;gap:10px;justify-content:space-between;
padding:12px;background:var(--surf);border-radius:var(--r);margin-bottom:8px;}
.flag-main{flex:1;min-width:0;}
.flag-q{font-family:var(--jp);font-size:15px;margin-bottom:3px;}
.flag-q .bk{display:inline-block;min-width:1.2em;padding:0 .1em;border-bottom:2px solid var(--blue);
text-align:center;color:var(--blue-tx);font-weight:500;}
.flag-meta{font-size:11px;color:var(--tx3);}
.edited-tag{color:var(--green-d);background:var(--green-bg);padding:1px 6px;border-radius:8px;font-size:10px;}
.flag-acts{display:flex;gap:6px;flex-shrink:0;}
.flag-edit,.flag-ok{font-family:var(--font);font-size:13px;padding:8px 12px;border-radius:8px;cursor:pointer;border:0.5px solid var(--bd2);}
.flag-edit{background:var(--blue);color:#fff;border-color:var(--blue);}
.flag-ok{background:var(--card);color:var(--tx2);}
.empty-note{text-align:center;color:var(--tx3);font-size:13px;padding:24px 0;}

/* 編集フォーム */
.edit-context{font-size:12px;color:var(--tx3);margin-bottom:12px;padding:8px 10px;background:var(--surf);border-radius:8px;}
.field.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field.two label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;font-weight:500;}
.edit-preview{font-family:var(--jp);font-size:18px;text-align:center;padding:14px;background:var(--surf);

.edit-preview .pv-y{font-size:11px;color:var(--tx3);vertical-align:.3em;}

.mr-browse:active{background:var(--surf);}
.hid-tag{color:var(--amber-tx);background:var(--amber-bg);padding:1px 6px;border-radius:8px;font-size:10px;}

  <div class="hd">
    <h1>漢字テスト 手書き</h1>
    <button class="gear" id="gear-btn" aria-label="範囲の管理">⚙</button>
  </div>

  <!-- セットアップ -->
  <div id="scr-setup">
    <div class="card setup">
      <h2>復習する範囲をえらぼう</h2>
      <div class="sub">マスに指やペンで漢字を書いて答えます</div>

      <div class="src-tabs">
        <button class="st on" id="tab-grade" data-src="grade">学年からえらぶ</button>
        <button class="st" id="tab-drill" data-src="drill">ドリル・問題集</button>
      </div>

      <!-- 学年モード -->
      <div id="src-grade">
        <div class="grade-row" id="grade-row"></div>
        <div id="grade-body"></div>
      </div>

      <!-- ドリルモード（既存の取り込み範囲) -->
      <div id="src-drill" class="hidden">
        <div class="range-list" id="range-list"></div>
      </div>

      <div class="qcount" id="qcount">出題数：0問</div>
      <div class="modes" id="modes">
        <button class="chip on" data-lim="all">ぜんぶ</button>
        <button class="chip" data-lim="10">10問</button>
        <button class="chip" data-lim="20">20問</button>
      </div>
      <button class="btn-primary" id="start-btn">はじめる</button>
    </div>
  </div>

  <!-- クイズ -->
  <div id="scr-quiz" class="hidden">
    <div class="card">
      <div class="quiz-top">
        <button class="to-menu" id="quiz-menu-btn">← メニュー</button>
        <span id="q-count">1 / 25</span>
        <div class="prog"><div class="prog-bar" id="q-bar"></div></div>
        <span id="q-badge"></span>
      </div>
      <div class="stem" id="stem"></div>

      <!-- 書く欄 -->
      <div id="write-zone">
        <div class="pad-wrap">
          <canvas id="pad"></canvas>
          <div class="pad-guide"></div>
        </div>
        <div class="pad-tools">
          <button class="tool" id="undo-btn">⤺ 一画もどす</button>
          <button class="tool" id="clear-btn">けす</button>
          <button class="tool report" id="report-btn">⚐ この問題、変かも</button>
        </div>
        <button class="btn-primary" id="check-btn">答え合わせ</button>
        <div class="recog-hint">漢字を書いて「答え合わせ」を押してね</div>
      </div>

      <!-- 判定欄 -->
      <div id="judge-zone" class="hidden">
        <div class="judge-stem" id="judge-stem"></div>
        <div class="compare">
          <div class="compare-col">
            <div class="compare-label">あなたの答え</div>
            <div class="compare-box"><img id="user-ink" alt="あなたの答え"></div>
          </div>
          <div class="compare-col">
            <div class="compare-label model">お手本</div>
            <div class="compare-box model"><span class="model-kanji" id="model-kanji"></span></div>
          </div>
        </div>
        <div class="judge-fb" id="judge-fb"></div>
        <div id="self-buttons" class="self-buttons hidden">
          <button class="self-btn ng" id="self-ng">× ちがった</button>
          <button class="self-btn ok" id="self-ok">○ 合ってた</button>
        </div>
        <div id="next-wrap" class="hidden">
          <button class="btn-next" id="next-btn">つぎへ</button>
          <button class="hide-this" id="hide-this-btn">この問題はもう出さない</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 結果 -->
  <div id="scr-result" class="hidden">
    <div class="card result" id="result"></div>
  </div>
</div>

<!-- 範囲管理シート -->
<div class="sheet hidden" id="sheet">
  <div class="sheet-inner">
    <div class="sheet-hd">
      <h2 id="sheet-title">範囲の管理</h2>
      <button class="x" id="sheet-close" aria-label="閉じる">×</button>
    </div>
    <div id="sv-menu">
      <div id="flagged-banner" class="flagged-banner hidden">
        <span id="flagged-count"></span>
        <button id="open-flagged">確認する</button>
      </div>
      <div id="manage-list"></div>
      <div class="addbtns">
        <button id="btn-manual">＋ 手入力で追加</button>
        <button id="btn-import" class="accent">データを貼り付け</button>
      </div>
    </div>

    <!-- 気になる問題 一覧 -->
    <div id="sv-flagged" class="hidden">
      <div id="flagged-list"></div>
      <div class="addbtns">
        <button id="flagged-back">もどる</button>
      </div>
    </div>

    <!-- 範囲の問題一覧(個別削除・復活) -->
    <div id="sv-rangelist" class="hidden">
      <div class="rl-rangetitle" id="rangelist-title"></div>
      <div class="rl-hint">「消す」で出題されなくなります。あとで「復活」でもどせます。</div>
      <div id="rangelist-items"></div>
      <button class="rl-restoreall" id="rangelist-restoreall">非表示をぜんぶ復活</button>
      <div class="addbtns">
        <button id="rangelist-back">もどる</button>
      </div>
    </div>

    <!-- 問題を編集 -->
    <div id="sv-edit" class="hidden">
      <div class="edit-context" id="edit-context"></div>
      <div class="field">
        <label>前の文</label>
        <input id="edit-pre" placeholder="例：本の内">
      </div>
      <div class="field two">
        <div><label>漢字（答え)</label><input id="edit-k" maxlength="3"></div>
        <div><label>読み</label><input id="edit-y"></div>
      </div>
      <div class="field two">
        <div><label>後の文</label><input id="edit-post" placeholder="例：器に入れる。"></div>
        <div><label>送り</label><input id="edit-ok"></div>
      </div>
      <div class="edit-preview" id="edit-preview"></div>
      <div id="edit-msg"></div>
      <div class="addbtns">
        <button id="edit-cancel">キャンセル</button>
        <button id="edit-save" class="accent">修正を保存</button>
      </div>
      <button class="edit-reset" id="edit-reset">この問題を元にもどす</button>
    </div>
    <div id="sv-manual" class="hidden">
      <div class="field"><label>範囲の名前</label>
        <input id="manual-title" placeholder="例：春に習う漢字③"></div>
      <div id="manual-rows"></div>
      <button class="btn-next" id="manual-add" style="margin-top:4px">＋ 問題を追加</button>
      <div id="manual-msg"></div>
      <div class="addbtns">
        <button id="manual-back">もどる</button>
        <button id="manual-save" class="accent">保存する</button>
      </div>
    </div>
    <div id="sv-import" class="hidden">
      <div class="field"><label>問題データ（JSON)を貼り付け</label>
        <textarea id="import-area" placeholder='Claudeが作ったデータをここに貼り付けてください'></textarea>

      <div id="import-msg"></div>
      <div class="addbtns">
        <button id="import-back">もどる</button>
        <button id="import-do" class="accent">取り込む</button>
      </div>
    </div>
  </div>
</div>

function saveHide(o){try{localStorage.setItem(LS_HIDE,JSON.stringify(o));}catch(e){}}
function isHidden(qkey){return !!loadHide()[qkey];}

function unhideQuestion(qkey){const h=loadHide();delete h[qkey];saveHide(h);}

function qKey(rangeId,item,i){return rangeId+"#"+(item.n||i);}

function applyOverride(rangeId,item,i){
  const ovr=loadOvr();const k=qKey(rangeId,item,i);
  if(!ovr[k])return item;
  const o=ovr[k];
  // 修正は1つの代表例文を持つ。元のcandsを置き換える。
  return {n:item.n,k:o.k||item.k,
    c:[{pre:o.pre||"",y:o.y||"",a:o.k||item.k,post:o.post||"",ok:o.ok||""}],
    _edited:true};
}

}

function rangeItems(rangeId,r){

}

function kanjiPrompt(ch){

}

function sentToItem(ch,g,sent,si){
  // sent.s 例: "母は古い【愛】犬を…" → pre="母は古い", 空欄, post="犬を…"
  const parts=sent.s.split(/【.*?】/);

  const y=sent.y||kanjiPrompt(ch);

  const body=$("#grade-body");body.innerHTML="";

  // 範囲（かたまり)リスト
  const anyOn=chunks.some((_,ci)=>isChunkSel(g,ci));
  const hd=document.createElement("div");hd.className="chunk-hd";
  hd.innerHTML=`<span class="ch-t">${g}年の漢字を範囲でえらぶ（${GRADE_CHARS[g].length}字）</span>
    <button class="ch-all">${anyOn?"ぜんぶ外す":"ぜんぶ選ぶ"}</button>`;
  hd.querySelector(".ch-all").addEventListener("click",()=>{
    const turnOn=!anyOn;
    chunks.forEach((_,ci)=>{gradeState.chunkSel[chunkKey(g,ci)]=turnOn;});
    saveGradeState();renderGrade();updateCount();
  });
  body.appendChild(hd);

  const list=document.createElement("div");list.className="chunk-list";
  chunks.forEach((chunk,ci)=>{
    const sel=isChunkSel(g,ci);
    const from=ci*CHUNK_SIZE+1, to=ci*CHUNK_SIZE+chunk.length;
    const d=document.createElement("div");
    d.className="chunk"+(sel?" sel":"");
    d.innerHTML=`<div class="ck">${sel?"✓":""}</div>
      <div class="cnm">${from}〜${to}字め</div>
      <div class="cprev">${esc(chunk.slice(0,8).join(""))}${chunk.length>8?"…":""}</div>`;
    d.addEventListener("click",()=>{
      gradeState.chunkSel[chunkKey(g,ci)]=!sel;saveGradeState();renderGrade();updateCount();
    });
    list.appendChild(d);
  });
  body.appendChild(list);

  // 選択中の範囲があれば、漢字個別のオン/オフグリッド
  if(anyOn){
    const selChars=[];
    chunks.forEach((chunk,ci)=>{if(isChunkSel(g,ci))chunk.forEach(ch=>selChars.push(ch));});
    const wrap=document.createElement("div");wrap.className="krid-wrap";
    const activeN=selChars.filter(ch=>!gradeState.off[ch]).length;
    wrap.innerHTML=`<div class="krid-hd"><span>出す漢字：${activeN} / ${selChars.length}字（タップで外す・戻す)</span>
      <button id="krid-reset">全部もどす</button></div>`;
    const grid=document.createElement("div");grid.className="kgrid";
    selChars.forEach(ch=>{
      const on=!gradeState.off[ch];
      const c=document.createElement("div");
      c.className="kc"+(on?" on":" off");c.textContent=ch;
      c.addEventListener("click",()=>{
        if(gradeState.off[ch])delete gradeState.off[ch];else gradeState.off[ch]=true;
        saveGradeState();renderGrade();updateCount();
      });
      grid.appendChild(c);
    });
    wrap.appendChild(grid);
    wrap.querySelector("#krid-reset").addEventListener("click",()=>{
      selChars.forEach(ch=>delete gradeState.off[ch]);saveGradeState();renderGrade();updateCount();
    });
    body.appendChild(wrap);
  }else{
    const e=document.createElement("div");e.className="grade-empty";
    e.textContent="上の範囲をえらぶと、ここに漢字が出ます";
    body.appendChild(e);
  }
}

// --- ドリルモード（従来の取り込み範囲) ---
function renderDrill(){
  const ranges=allRanges();
  if(selectedIds.size===0){
    try{JSON.parse(localStorage.getItem(LS_SEL)||"[]").forEach(id=>{if(ranges[id])selectedIds.add(id);});}catch(e){}

function persistSel(){try{localStorage.setItem(LS_SEL,JSON.stringify([...selectedIds]));}catch(e){}}

// 現在のモードの出題対象を返す
function selItems(){
  if(srcMode==="grade")return gradeSelItems();
  const r=allRanges();let it=[];
  for(const id of selectedIds){
    if(r[id]){
      rangeItems(id,r[id]).forEach((item,i)=>{

function updateCount(){

  $("#qcount").textContent=n===0?(srcMode==="grade"?"範囲をえらんでください":"ドリルをえらんでください"):`出題数：${q}問`;

// ===== クイズ =====
function pickCand(item){return item.c[Math.floor(Math.random()*item.c.length)];}
function start(){
  let items=shuffle(selItems().slice());
  let lim=items.length;
  if(limitMode==="10")lim=Math.min(10,items.length);
  if(limitMode==="20")lim=Math.min(20,items.length);
  items=items.slice(0,lim);
  queue=items.map(x=>({item:x.item,c:pickCand(x.item),correct:x.item.k,
                       rangeId:x.rangeId,qkey:x.qkey}));
  idx=0;wrong=[];round=1;firstTotal=queue.length;firstCorrect=0;
  show("quiz");
  resizeCanvas();
  renderQ();
  // レイアウト（vh依存)確定後に再計測して、iOSでパッドサイズがずれないように
  requestAnimationFrame(()=>{if(canvas&&phase==="write"){resizeCanvas();}});
}
function renderQ(){
  phase="write";
  const q=queue[idx];
  $("#q-count").textContent=`${idx+1} / ${queue.length}`;
  $("#q-bar").style.width=(idx/queue.length*100)+"%";
  $("#q-badge").innerHTML=round>1?`<span class="badge">復習 ${round-1}回目</span>`:"";
  const c=q.c;
  let stem=esc(c.pre)+`<span class="blank">?</span>`;
  if(c.y)stem+=`<span class="yomi">${esc(c.y)}</span>`;
  stem+=esc(c.ok)+esc(c.post);
  $("#stem").innerHTML=stem;
  // 書く欄表示・判定欄非表示
  $("#write-zone").classList.remove("hidden");
  $("#judge-zone").classList.add("hidden");

  clearCanvas();
  resetStrokes();
}

// ---- 手書きキャンバス ----
let canvas,ctx,drawing=false,strokes=[],curStroke=null,startTime=0;
function initCanvas(){
  canvas=$("#pad");ctx=canvas.getContext("2d");
  resizeCanvas();
  const getPos=e=>{
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return {x:t.clientX-r.left, y:t.clientY-r.top};
  };
  const down=e=>{e.preventDefault();drawing=true;const p=getPos(e);
    curStroke={x:[p.x],y:[p.y],t:[Date.now()-startTime]};
    ctx.beginPath();ctx.moveTo(p.x,p.y);};
  const move=e=>{if(!drawing)return;e.preventDefault();const p=getPos(e);
    curStroke.x.push(p.x);curStroke.y.push(p.y);curStroke.t.push(Date.now()-startTime);
    ctx.lineTo(p.x,p.y);ctx.stroke();};
  const up=e=>{if(!drawing)return;e.preventDefault();drawing=false;
    if(curStroke&&curStroke.x.length>0)strokes.push(curStroke);curStroke=null;};
  canvas.addEventListener("mousedown",down);canvas.addEventListener("mousemove",move);
  window.addEventListener("mouseup",up);
  canvas.addEventListener("touchstart",down,{passive:false});
  canvas.addEventListener("touchmove",move,{passive:false});
  canvas.addEventListener("touchend",up,{passive:false});
}
function resizeCanvas(){
  const r=canvas.getBoundingClientRect();
  if(r.width===0||r.height===0)return; // レイアウト未確定時はスキップ
  const dpr=window.devicePixelRatio||1;
  canvas.width=Math.round(r.width*dpr);
  canvas.height=Math.round(r.height*dpr);
  // 論理座標で描けるよう変換を設定
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.lineWidth=8;ctx.lineCap="round";ctx.lineJoin="round";
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--ink-stroke').trim()||"#222";
}
function clearCanvas(){if(ctx&&canvas){ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.restore();}}
function resetStrokes(){strokes=[];curStroke=null;startTime=Date.now();}
function undoStroke(){
  if(strokes.length>0){strokes.pop();redraw();}
}
function redraw(){
  clearCanvas();
  const r=canvas.getBoundingClientRect();
  ctx.lineWidth=8;ctx.lineCap="round";ctx.lineJoin="round";
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--ink-stroke').trim()||"#222";
  for(const s of strokes){
    ctx.beginPath();
    for(let i=0;i<s.x.length;i++){
      if(i===0)ctx.moveTo(s.x[i],s.y[i]);else ctx.lineTo(s.x[i],s.y[i]);
    }
    ctx.stroke();
  }
}

// ---- 認識(Google inputtools) ----
async function recognize(){
  if(strokes.length===0)return {ok:false,cands:[],reason:"empty"};
  const r=canvas.getBoundingClientRect();
  const ink=strokes.map(s=>[s.x,s.y,s.t]);
  const body={
    options:"enable_pre_space",
    requests:[{
      writing_guide:{writing_area_width:Math.round(r.width),writing_area_height:Math.round(r.height)},
      ink:ink, language:"ja"
    }]
  };
  try{
    const res=await fetch("https://inputtools.google.com/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8",{
      method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)
    });
    if(!res.ok)return {ok:false,cands:[],reason:"http"+res.status};
    const data=await res.json();
    if(data[0]==="SUCCESS"&&data[1]&&data[1][0]&&data[1][0][1]){
      return {ok:true,cands:data[1][0][1]};
    }
    return {ok:false,cands:[],reason:"noresult"};
  }catch(e){
    return {ok:false,cands:[],reason:"neterr"};
  }
}

// キャンバスの筆跡を画像URLとして取得(背景を白にして見やすく)
function captureInk(){
  if(!canvas)return null;
  const tmp=document.createElement("canvas");
  tmp.width=canvas.width;tmp.height=canvas.height;
  const tc=tmp.getContext("2d");
  // 透明背景のまま(CSSで枠を出す)
  tc.drawImage(canvas,0,0);
  return tmp.toDataURL("image/png");
}

async function checkAnswer(){
  if(phase!=="write")return;
  const q=queue[idx];
  const inkURL=captureInk();
  if(strokes.length===0){
    showJudge(q,null,inkURL);
    return;
  }
  $("#check-btn").disabled=true;
  $("#check-btn").textContent="認識中…";
  const result=await recognize();
  $("#check-btn").disabled=false;
  $("#check-btn").textContent="答え合わせ";

  if(result.ok&&result.cands.length>0){
    const top=result.cands.slice(0,5);
    if(top.includes(q.correct)){
      autoGrade(q,true,top,inkURL);
      return;
    }else{
      showJudge(q,top,inkURL);
      return;
    }
  }
  showJudge(q,null,inkURL);
}

function setCompare(q,inkURL){
  const img=$("#user-ink");
  if(inkURL){img.src=inkURL;img.style.display="";}
  else{img.removeAttribute("src");img.style.display="none";}
  $("#model-kanji").textContent=q.correct;
}

function autoGrade(q,correct,cands,inkURL){
  phase="judge";
  if(correct&&round===1)firstCorrect++;
  if(!correct)wrong.push(q);
  $("#write-zone").classList.add("hidden");
  $("#judge-zone").classList.remove("hidden");
  $("#judge-stem").innerHTML=judgeStemHTML(q.c,q.correct);
  setCompare(q,inkURL);
  $("#judge-fb").innerHTML=`<div class="big-ok">正解！</div>
    <div class="recog-note">認識結果：${cands.map(x=>esc(x)).join(" ")}</div>`;
  $("#self-buttons").classList.add("hidden");
  $("#next-wrap").classList.remove("hidden");
  $("#next-btn").textContent=(idx+1<queue.length)?"つぎへ":"けっかを見る";
}

function showJudge(q,cands,inkURL){
  phase="judge";
  $("#write-zone").classList.add("hidden");
  $("#judge-zone").classList.remove("hidden");
  $("#judge-stem").innerHTML=judgeStemHTML(q.c,q.correct);
  setCompare(q,inkURL);
  let note="";
  if(cands&&cands.length)note=`<div class="recog-note">読み取り結果：${cands.map(x=>esc(x)).join(" ")}<br>左の自分の字と右のお手本を見くらべてね。</div>`;
  else note=`<div class="recog-note">左の自分の字と右のお手本を見くらべて、○か×をえらんでね。</div>`;
  $("#judge-fb").innerHTML=note;
  $("#self-buttons").classList.remove("hidden");
  $("#next-wrap").classList.add("hidden");
}
function judgeStemHTML(c,k){
  return esc(c.pre)+`<span class="blank ok">${esc(k)}</span>`
    +(c.ok?esc(c.ok):"")+esc(c.post);
}

function selfGrade(ok){
  const q=queue[idx];
  if(ok&&round===1)firstCorrect++;
  if(!ok)wrong.push(q);
  $("#self-buttons").classList.add("hidden");
  $("#next-wrap").classList.remove("hidden");
  $("#next-btn").textContent=(idx+1<queue.length)?"つぎへ":"けっかを見る";
  $("#judge-fb").innerHTML=`<div class="self-result ${ok?'ok':'ng'}">${ok?"○ 合ってた！":"× もう一度ふくしゅう"}</div>`;
}

// ---- 問題のフラグ(気になる問題) ----
function flagCurrent(){
  const q=queue[idx];
  const flags=loadFlags();
  flags[q.qkey]={rangeId:q.rangeId, when:Date.now()};
  saveFlags(flags);
  const btn=$("#report-btn");
  btn.textContent="⚐ マークしたよ";
  btn.classList.add("flagged");
  setTimeout(()=>{btn.textContent="⚐ この問題、変かも";btn.classList.remove("flagged");},1500);
  updateFlaggedBanner();
}
// クイズ中に現在の問題を非表示にして次へ
function hideCurrentAndNext(){
  const q=queue[idx];
  if(!confirm("この問題をもう出さないようにしますか？（設定からあとで復活できます)"))return;
  hideQuestion(q.qkey,q.rangeId);
  const fl=loadFlags();if(fl[q.qkey]){delete fl[q.qkey];saveFlags(fl);}
  // この問題が今回の不正解リストに入っていたら除外
  wrong=wrong.filter(w=>w.qkey!==q.qkey);
  next();
}

function next(){
  idx++;
  if(idx<queue.length){renderQ();return;}
  if(wrong.length>0){
    queue=wrong.map(q=>({item:q.item,c:pickCand(q.item),correct:q.item.k,
                         rangeId:q.rangeId,qkey:q.qkey}));
    wrong=[];idx=0;round++;renderQ();
  }else finish();
}
function finish(){
  const pct=Math.round(firstCorrect/firstTotal*100);
  const msg=pct===100?"全問正解！すばらしい":pct>=80?"よくできました":pct>=60?"あと少し":"もう一度ふくしゅうしよう";
  $("#result").innerHTML=`<h2>おつかれさま</h2><div class="score">${firstCorrect} / ${firstTotal}</div>
    <div class="rlabel">1回目の正答率 ${pct}%　・　${msg}</div>
    <button class="btn-primary" id="again-btn">もう一回（新しい問題)</button>
    <button class="to-menu" id="result-menu-btn">メニューに戻る</button>`;
  $("#again-btn").addEventListener("click",()=>{show("setup");renderSetup();});
  $("#result-menu-btn").addEventListener("click",()=>{show("setup");renderSetup();});
  show("result");
}

function show(n){["setup","quiz","result"].forEach(x=>$("#scr-"+x).classList.toggle("hidden",x!==n));}
// クイズ途中でメニューへ戻る（解答が消えるので確認)
function quitToMenu(){
  const answered=idx>0 || phase==="judge";
  if(answered && !confirm("クイズをやめてメニューにもどりますか？\nいまの答えは消えます。")) return;
  show("setup");renderSetup();
}

function visibleCount(id,r){

function backToMenu(){showSheetView("menu");renderManage();updateFlaggedBanner();}

// ---- 気になる問題 ----
function updateFlaggedBanner(){
  const flags=loadFlags();const n=Object.keys(flags).length;
  const banner=$("#flagged-banner");
  if(n>0){banner.classList.remove("hidden");$("#flagged-count").textContent=`⚐ 気になる問題が ${n}件あります`;}
  else banner.classList.add("hidden");
}
// qkey から問題本体を探す
function findQuestion(qkey){
  const ranges=allRanges();
  for(const[id,r]of Object.entries(ranges)){
    for(let i=0;i<r.items.length;i++){
      if(qKey(id,r.items[i],i)===qkey){
        return {rangeId:id, rangeTitle:r.title, item:applyOverride(id,r.items[i],i),
                orig:r.items[i], index:i};
      }
    }
  }
  return null;
}
function renderFlagged(){
  const flags=loadFlags();const box=$("#flagged-list");box.innerHTML="";
  const keys=Object.keys(flags);
  if(keys.length===0){box.innerHTML=`<div class="empty-note">気になる問題はありません。</div>`;return;}
  for(const qkey of keys){
    const f=findQuestion(qkey);
    if(!f){const flg=loadFlags();delete flg[qkey];saveFlags(flg);continue;}
    const c=f.item.c[0];
    const div=document.createElement("div");div.className="flag-item";
    div.innerHTML=`<div class="flag-main">
        <div class="flag-q">${esc(c.pre)}<span class="bk">${esc(f.item.k)}</span>${esc(c.ok)}${esc(c.post)}</div>
        <div class="flag-meta">${esc(f.rangeTitle)}　読み:${esc(c.y)||"—"}${f.item._edited?'　<span class="edited-tag">修正済</span>':''}</div>
      </div>`;
    const acts=document.createElement("div");acts.className="flag-acts";
    const editB=document.createElement("button");editB.className="flag-edit";editB.textContent="直す";
    editB.addEventListener("click",()=>openEdit(qkey,"flagged"));
    const okB=document.createElement("button");okB.className="flag-ok";okB.textContent="解決";
    okB.addEventListener("click",()=>{const flg=loadFlags();delete flg[qkey];saveFlags(flg);renderFlagged();updateFlaggedBanner();});
    acts.appendChild(editB);acts.appendChild(okB);div.appendChild(acts);
    box.appendChild(div);
  }
}

// ---- 問題の編集 ----
let editingKey=null, editReturn="flagged";
function openEdit(qkey,returnTo){
  const f=findQuestion(qkey);if(!f)return;
  editingKey=qkey;editReturn=returnTo||"flagged";
  const c=f.item.c[0];
  $("#edit-context").textContent=`${f.rangeTitle}`;
  $("#edit-pre").value=c.pre||"";
  $("#edit-k").value=f.item.k||"";
  $("#edit-y").value=c.y||"";
  $("#edit-post").value=c.post||"";
  $("#edit-ok").value=c.ok||"";
  $("#edit-msg").textContent="";
  const ovr=loadOvr();
  $("#edit-reset").style.display=ovr[qkey]?"block":"none";
  updateEditPreview();
  showSheetView("edit");
}
function afterEditReturn(){
  if(editReturn==="rangelist"){showSheetView("rangelist");renderRangeList();}
  else{showSheetView("flagged");renderFlagged();}
  updateFlaggedBanner();
}
function updateEditPreview(){
  const pre=$("#edit-pre").value,k=$("#edit-k").value,y=$("#edit-y").value,
        post=$("#edit-post").value,ok=$("#edit-ok").value;
  $("#edit-preview").innerHTML=esc(pre)+`<span class="bk">${k?esc(k):"　"}</span>`
    +(y?`<span class="pv-y">${esc(y)}</span>`:"")+esc(ok)+esc(post);
}
function saveEdit(){
  const k=$("#edit-k").value.trim();
  if(!k){setMsg("edit-msg","漢字（答え)を入力してください。","err");return;}
  const ovr=loadOvr();
  ovr[editingKey]={k,
    pre:$("#edit-pre").value.trim(),y:$("#edit-y").value.trim(),
    post:$("#edit-post").value.trim(),ok:$("#edit-ok").value.trim()};
  saveOvr(ovr);
  const flags=loadFlags();delete flags[editingKey];saveFlags(flags);
  setMsg("edit-msg","修正を保存しました。","ok");
  setTimeout(afterEditReturn,800);
}
function resetEdit(){
  if(!editingKey)return;
  if(!confirm("この問題を元の内容にもどしますか？"))return;
  const ovr=loadOvr();delete ovr[editingKey];saveOvr(ovr);
  setMsg("edit-msg","元にもどしました。","ok");
  setTimeout(afterEditReturn,800);
}

// JSON取込
function openImport(){$("#import-area").value="";$("#import-msg").textContent="";showSheetView("import");}
function doImport(){
  const txt=$("#import-area").value.trim();
  if(!txt){setMsg("import-msg","データを貼り付けてください。","err");return;}
  let data;try{data=JSON.parse(txt);}catch(e){setMsg("import-msg","JSONの形式が正しくありません。","err");return;}
  let ranges=[];
  if(Array.isArray(data))ranges=data;
  else if(data.items)ranges=[data];
  else if(data.ranges&&Array.isArray(data.ranges))ranges=data.ranges;
  else{setMsg("import-msg","range形式が認識できません。","err");return;}
  const u=loadUser();let added=0;
  for(const r of ranges){
    if(!r.items||!Array.isArray(r.items)||!r.items.length)continue;
    const items=r.items.map(normalizeItem).filter(Boolean);
    if(!items.length)continue;
    const id="r"+Date.now()+"_"+Math.floor(Math.random()*1000);
    u[id]={title:r.title||"追加した範囲",range:r.range||"",items};added++;
  }
  if(added===0){setMsg("import-msg","追加できる範囲がありませんでした。","err");return;}
  saveUser(u);setMsg("import-msg",`${added}個の範囲を追加しました。`,"ok");
  setTimeout(()=>{backToMenu();renderSetup();},900);
}
function normalizeItem(it){
  const k=it.k||it.kanji;if(!k)return null;
  let cands=it.c||it.cands;
  if(!cands||!cands.length){if(it.answer||it.a)cands=[it];else return null;}
  const c=cands.map(x=>({pre:x.pre||"",y:x.y||x.yomi||"",a:x.a||x.answer||k,post:x.post||"",ok:x.ok||x.okuri||""})).filter(x=>x.a);
  if(!c.length)return null;
  return {n:it.n||it.num||0,k,c};
}
// 手入力
let formRows=[];
function openManual(){formRows=[{k:"",y:"",pre:"",post:"",ok:""}];$("#manual-title").value="";renderForm();showSheetView("manual");}
function renderForm(){
  const box=$("#manual-rows");box.innerHTML="";
  formRows.forEach((row,i)=>{
    const d=document.createElement("div");d.className="qrow";
    d.innerHTML=`<div class="qn">${i+1}</div>`;
    const qf=document.createElement("div");qf.className="qf";
    qf.innerHTML=`<div class="line">
        <input class="k" placeholder="漢字" value="${escA(row.k)}" data-f="k" maxlength="3">
        <input class="y" placeholder="読み" value="${escA(row.y)}" data-f="y"></div>
      <div class="line"><input placeholder="前の文（例：本の内)" value="${escA(row.pre)}" data-f="pre"></div>
      <div class="line"><input placeholder="後の文（例：器に入れる。)" value="${escA(row.post)}" data-f="post">
        <input class="y" placeholder="送り" value="${escA(row.ok)}" data-f="ok"></div>
      <div class="preview-line"></div>`;
    qf.querySelectorAll("input").forEach(inp=>inp.addEventListener("input",()=>{row[inp.dataset.f]=inp.value;updPv(qf,row);}));
    const del=document.createElement("button");del.className="del";del.textContent="✕";
    del.addEventListener("click",()=>{formRows.splice(i,1);if(!formRows.length)formRows.push({k:"",y:"",pre:"",post:"",ok:""});renderForm();});
    d.appendChild(qf);
    if(formRows.length>1){const w=document.createElement("div");w.appendChild(del);d.appendChild(w);}
    box.appendChild(d);updPv(qf,row);
  });
}
function updPv(qf,row){
  const pv=qf.querySelector(".preview-line");
  if(!row.k&&!row.pre&&!row.post){pv.textContent="";return;}
  pv.innerHTML=esc(row.pre)+`<span class="bk">${row.k?esc(row.k):"　"}</span>`
    +(row.y?`<span style="font-size:11px;color:var(--tx3)">${esc(row.y)}</span>`:"")+esc(row.ok)+esc(row.post);
}
function addFormRow(){formRows.push({k:"",y:"",pre:"",post:"",ok:""});renderForm();
  $("#manual-rows").lastElementChild.scrollIntoView({behavior:"smooth",block:"center"});}
function saveManual(){
  const title=$("#manual-title").value.trim()||"手入力の範囲";
  const items=formRows.filter(r=>r.k).map((r,i)=>({n:i+1,k:r.k.trim(),
    c:[{pre:r.pre.trim(),y:r.y.trim(),a:r.k.trim(),post:r.post.trim(),ok:r.ok.trim()}]}));
  if(!items.length){setMsg("manual-msg","漢字を1つ以上入力してください。","err");return;}
  const u=loadUser();const id="r"+Date.now()+"_"+Math.floor(Math.random()*1000);
  u[id]={title,range:"",items};saveUser(u);
  setMsg("manual-msg",`「${title}」(${items.length}問)を追加しました。`,"ok");
  setTimeout(()=>{backToMenu();renderSetup();},900);
}

// ---- util ----
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setMsg(id,t,c){const e=$("#"+id);e.textContent=t;e.className="msg "+c;}
function esc(s){return(s||"").replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function escA(s){return(s||"").replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function init(){
  renderSetup();initCanvas();updateFlaggedBanner();
  $("#tab-grade").addEventListener("click",()=>{srcMode="grade";try{localStorage.setItem(LS_SRC,"grade");}catch(e){}renderSetup();});
  $("#tab-drill").addEventListener("click",()=>{srcMode="drill";try{localStorage.setItem(LS_SRC,"drill");}catch(e){}renderSetup();});
  $("#start-btn").addEventListener("click",start);
  $("#quiz-menu-btn").addEventListener("click",quitToMenu);
  $("#next-btn").addEventListener("click",next);
  $("#check-btn").addEventListener("click",checkAnswer);
  $("#undo-btn").addEventListener("click",undoStroke);
  $("#clear-btn").addEventListener("click",()=>{clearCanvas();resetStrokes();});
  $("#report-btn").addEventListener("click",flagCurrent);
  $("#self-ok").addEventListener("click",()=>selfGrade(true));
  $("#self-ng").addEventListener("click",()=>selfGrade(false));
  $("#gear-btn").addEventListener("click",openManage);
  $("#sheet-close").addEventListener("click",closeSheet);
  $("#sheet").addEventListener("click",e=>{if(e.target===$("#sheet"))closeSheet();});
  $("#btn-manual").addEventListener("click",openManual);
  $("#btn-import").addEventListener("click",openImport);
  $("#manual-add").addEventListener("click",addFormRow);
  $("#manual-save").addEventListener("click",saveManual);
  $("#manual-back").addEventListener("click",backToMenu);
  $("#import-do").addEventListener("click",doImport);
  $("#import-back").addEventListener("click",backToMenu);
  // 気になる問題・編集
  $("#open-flagged").addEventListener("click",()=>{renderFlagged();showSheetView("flagged");});
  $("#flagged-back").addEventListener("click",backToMenu);
  $("#edit-cancel").addEventListener("click",afterEditReturn);
  $("#edit-save").addEventListener("click",saveEdit);
  $("#edit-reset").addEventListener("click",resetEdit);
  ["#edit-pre","#edit-k","#edit-y","#edit-post","#edit-ok"].forEach(s=>
    $(s).addEventListener("input",updateEditPreview));
  // 範囲の問題一覧・個別削除
  $("#rangelist-back").addEventListener("click",backToMenu);
  $("#rangelist-restoreall").addEventListener("click",restoreAllInRange);
  $("#hide-this-btn").addEventListener("click",hideCurrentAndNext);
  $$("#modes .chip").forEach(c=>c.addEventListener("click",()=>{
    $$("#modes .chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");
    limitMode=c.dataset.lim;updateCount();
  }));
  const onViewportChange=()=>{if(canvas&&phase==="write"){const s=strokes.slice();resizeCanvas();strokes=s;redraw();}};
  window.addEventListener("resize",onViewportChange);
  window.addEventListener("orientationchange",()=>setTimeout(onViewportChange,200));
  if(window.visualViewport){window.visualViewport.addEventListener("resize",onViewportChange);}
}
if(document.readyState!=="loading")init();else document.addEventListener("DOMContentLoaded",init);
})();
</script></body></html>
